# This file contains the thresholds and routing rules for the extraction pipeline.
# All values here should match the finalized settings from DOMAIN_NOTES.md.

triage:
  scanned_detection:
    scanned_by_density: 0.0004
    ghost_text_scan_img: 0.80
    ghost_text_scan_density: 0.001
    high_image_thin_img: 0.70
    high_image_thin_density: 0.001

  mixed_gate:
    density_ceiling: 0.01
    image_floor: 0.50

  layout_complexity:
    table_heavy_threshold: 0.3
    multi_column_xjump: 0.08  # Provisional threshold

strategy_routing:
  strategy_a:
    triggers:
      origin_type: [mixed, native_digital]
      layout_complexity: [single_column]
    confidence_gates:
      min_char_density: 0.001
      max_image_area_ratio: 0.61
      min_confidence_score: 0.75
    escalation_target: strategy_b
    escalation:
      to_c_if:
        image_area_ratio_gte: 0.70
        char_density_lte: 0.001
        char_count_lte: 200
      default_target: strategy_b

  strategy_b:
    triggers:
      origin_type: [mixed, native_digital]
      layout_complexity: [multi_column, table_heavy]
    confidence_gates:
      min_confidence_score: 0.65
    escalation_target: strategy_c
    escalation_scope: page_level

  strategy_c:
    triggers:
      origin_type: [scanned_image]
    tools:
      primary_ocr: easyocr
      fallback_vlm:
        provider: ollama
        model: minicpm-v
    execution_policy:
      # When OCR output is weak, re-run that page using the VLM.
      escalate_to_vlm_on_low_ocr_confidence: true
      ocr_min_chars_per_page: 50          # tune after runs
      ocr_min_mean_confidence: 0.50       # tune after runs
      failure_policy:
        # If EasyOCR is unavailable (or OCR crashes), run VLM-only for that page.
        ocr_unavailable: vlm_only
        ocr_failure: vlm_only
        # If VLM fails too: keep_ocr (if any) or emit an error page.
        vlm_failure: error_page
    budget_guard:
      # Strategy C runs on local compute via Ollama (MiniCPM-V), not paid APIs.
      # These limits are operational safeguards to prevent runaway GPU/CPU usage.
      # They represent compute governance, not financial spend caps.
      cost_model: local_compute
      cost_per_page_estimate_usd: 0.0
      max_pages_per_document: 200
      max_vlm_pages_per_document: 40
      max_total_runtime_seconds: 900
      timeout_per_page_seconds: 45
      max_render_dpi: 200

provenance:
  require_page_ref: true
  require_bbox: true
  require_content_hash: true
